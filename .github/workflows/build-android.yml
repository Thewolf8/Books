name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # تحديث لـ Node 22 لتفادي التنبيه
          cache: 'npm'
          cache-dependency-path: 'Books/package-lock.json' # تحديد مسار ملف الـ lock بدقة

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/android/build.gradle*', '**/android/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: |
          cd Books
          npm ci

      - name: Type check
        run: |
          cd Books
          npm run type-check

      - name: Make Gradlew executable
        run: chmod +x Books/android/gradlew

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: |
          cd Books/android
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        env:
          ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Decode keystore from base64 secret
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > Books/android/release.keystore
          cd Books/android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: Books/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: Books/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # تحديث لـ Node 22
          cache: 'npm'
          cache-dependency-path: 'Books/package-lock.json'

      - name: Install dependencies
        run: |
          cd Books
          npm ci

      - name: Run ESLint
        run: |
          cd Books
          npm run lint

      - name: Run tests
        run: |
          cd Books
          npm test -- --coverage --watchAll=false
